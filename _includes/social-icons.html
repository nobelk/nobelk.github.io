<div class="social-icons">
  {%- if site.author.github -%}
    <a href="https://github.com/{{ site.author.github }}" rel="me" aria-label="GitHub">GitHub</a>
  {%- endif -%}
  {%- if site.author.twitter -%}
    <a href="https://twitter.com/{{ site.author.twitter }}" rel="me" aria-label="Twitter">Twitter</a>
  {%- endif -%}
  {%- if site.author.mastodon -%}
    <a href="{{ site.author.mastodon }}" rel="me" aria-label="Mastodon">Mastodon</a>
  {%- endif -%}
  {%- if site.author.linkedin -%}
    <a href="https://linkedin.com/in/{{ site.author.linkedin }}" rel="me" aria-label="LinkedIn">LinkedIn</a>
  {%- endif -%}
  <a href="{{ '/feed.xml' | relative_url }}" aria-label="RSS feed">RSS</a>
</div>
