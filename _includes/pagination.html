{% if paginator.total_pages > 1 %}
<nav class="pagination" aria-label="Pagination">
  {% if paginator.previous_page %}
    <a class="pagination__prev" href="{{ paginator.previous_page_path | relative_url }}">&larr; Newer</a>
  {% else %}
    <span></span>
  {% endif %}
  <span class="pagination__current">Page {{ paginator.page }} of {{ paginator.total_pages }}</span>
  {% if paginator.next_page %}
    <a class="pagination__next" href="{{ paginator.next_page_path | relative_url }}">Older &rarr;</a>
  {% else %}
    <span></span>
  {% endif %}
</nav>
{% endif %}
