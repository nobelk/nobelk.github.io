# Site identity
title: Zero Downtime
tagline: Notes on building systems that don't fall over
description: >-
  Technical writing on distributed systems, reliability, and operational
  excellence by Dr. Nobel Khandaker.

url: https://zerodowntime.dev
baseurl: ""
lang: en

# IMPORTANT: keep `author` as a string (not a hash) for jekyll-seo-tag.
# When `author` is a hash without an explicit `twitter` key, jekyll-seo-tag's
# AuthorDrop silently falls back to `author.name` and emits a malformed
# <meta name="twitter:creator" content="@Display Name">. Passing a string
# bypasses that fallback while still producing a clean JSON-LD Person.
author: Dr. Nobel Khandaker

# Structured owner data for OUR templates (footer, social icons, etc).
# Don't move this into `author:` — see note above.
owner:
  name: Dr. Nobel Khandaker
  email: nobel@intramotev.com
  github: nobelk
  # Add additional handles as they're created — social-icons.html renders any present:
  # twitter: nobelk
  # mastodon: https://hachyderm.io/@nobelk
  # linkedin: nobelk

# `social:` is INTENTIONALLY OMITTED. On `homepage_or_about` pages,
# jekyll-seo-tag uses `site.social.name` to override the JSON-LD `name`,
# which conflates Person schema with WebSite schema — the homepage would
# emit `name: "Dr. Nobel Khandaker"` instead of `name: "Zero Downtime"`.
# Re-enable once there are multiple social profiles worth `sameAs`-linking,
# AND set `social.name` equal to `site.title` to preserve the site's name:
#   social:
#     name: Zero Downtime
#     links:
#       - https://github.com/nobelk
#       - https://...

# Twitter card config is INTENTIONALLY OMITTED until a real handle exists.
# Defining `site.twitter` (even a hash with no username) makes jekyll-seo-tag
# emit <meta name="twitter:site" content="@">, which is broken metadata.
# When you have a handle, add:
#   twitter:
#     username: nobelk
#     card: summary_large_image

# Phase 11 will populate these once the custom domain is verified in
# Google Search Console and Bing Webmaster Tools (DNS TXT or HTML file).
# webmaster_verifications:
#   google: ""
#   bing: ""

# Comments (giscus) — Phase 7.
# The include at _includes/comments.html checks `site.giscus.repo_id` before
# emitting anything, so leaving these blank keeps the widget off rather than
# rendering a broken one. To activate:
#   1. Enable Discussions in the repo's Settings → General → Features.
#   2. Install the giscus GitHub App: https://github.com/apps/giscus
#   3. Visit https://giscus.app and walk the form against this repo; copy the
#      `data-*` values it emits into the fields below.
# `mapping: pathname` ties each thread to a post's URL path — safer than
# `title` (renames break threads) or `og:url` (changes with site.url flips).
giscus:
  repo: ""           # "owner/name"
  repo_id: ""        # opaque id from giscus.app
  category: ""       # Discussion category name (e.g. "Comments")
  category_id: ""    # opaque id from giscus.app
  mapping: pathname
  reactions_enabled: 1
  input_position: bottom
  theme: light
  lang: en

# Analytics (Plausible) — Phase 8.
# Script only ships when BOTH `site.plausible.domain` is set AND
# jekyll.environment == "production", so local `rake serve` runs stay silent.
# Set `script_src` only if proxying through your own domain; otherwise leave
# blank and the include uses the default Plausible CDN.
plausible:
  domain: ""                 # e.g. "zerodowntime.dev"
  script_src: ""             # optional proxy URL; blank = https://plausible.io/js/script.js

# Build behavior
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  hard_wrap: false

permalink: /:year/:month/:day/:title.html
excerpt_separator: <!--more-->

paginate: 16
paginate_path: /p/:num

timezone: America/New_York

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-redirect-from
  - jekyll-archives
  - jekyll-last-modified-at

jekyll-archives:
  enabled:
    - tags
    - categories
  layouts:
    tag: tag
    category: category
  permalinks:
    tag: /tag/:name/
    category: /category/:name/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
  - scope:
      path: "pages"
    values:
      layout: page

exclude:
  - Gemfile
  - Gemfile.lock
  - Rakefile
  - README.md
  - LICENSE
  - CLAUDE.md
  - blog_deployment_plan.md
  - mise.toml
  - vendor
  - node_modules
  - package.json
  - package-lock.json
  - .bundle
  - .ruby-version
